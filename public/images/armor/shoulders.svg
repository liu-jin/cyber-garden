<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pearl-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  <!-- Left Shoulder -->
  <path d="M10,40 Q10,20 30,20 L40,20 Q45,20 45,30 L45,50 Q45,60 35,60 L20,60 Q10,60 10,50 Z" fill="url(#pearl-grad)" stroke="white" stroke-width="1" />
  <circle cx="20" cy="30" r="3" fill="currentColor" />
  
  <!-- Right Shoulder -->
  <path d="M90,40 Q90,20 70,20 L60,20 Q55,20 55,30 L55,50 Q55,60 65,60 L80,60 Q90,60 90,50 Z" fill="url(#pearl-grad)" stroke="white" stroke-width="1" />
  <circle cx="80" cy="30" r="3" fill="currentColor" />
  
  <!-- Connecting Neon Line -->
  <path d="M45,35 Q50,30 55,35" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="2,2" />
</svg>
