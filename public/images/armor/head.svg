<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pearl-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:0.4" />
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Main Helmet Base -->
  <path d="M20,50 Q20,20 50,20 Q80,20 80,50 L80,60 Q80,70 70,70 L30,70 Q20,70 20,60 Z" fill="url(#pearl-grad)" stroke="white" stroke-width="1.5" filter="url(#neon-glow)" />
  <!-- Dragon Horn Slots (Luminous) -->
  <path d="M30,25 Q35,10 40,25" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
  <path d="M60,25 Q65,10 70,25" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
  <!-- Visor -->
  <rect x="30" y="45" width="40" height="8" rx="4" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="1" />
</svg>
